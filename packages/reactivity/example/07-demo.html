<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script type="module">
        import { effect, ref, computed } from '../dist/reactivity.esm.js'

        const count = ref(0)

        const doubleCount = computed(() => {
            return count.value + 2
        })

        effect(() => {
            console.log(doubleCount.value, "doubleCount.value");
        })

        setTimeout(() => {
            count.value = 100
        }, 1000)
    </script>
</body>

</html>
