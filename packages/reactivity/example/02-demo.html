<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <div>
        <button id="btn">
            按钮
        </button>
    </div>

    <script type="module">
        import { ref, effect } from '../dist/reactivity.esm.js'

        const flag = ref(true)

        effect(() => {
            flag.value
        })
        setTimeout(() => {
            flag.value = !flag.value;
        }, 1000);

    </script>

</body>

</html>
